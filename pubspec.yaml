name: mi_app_flutter
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Versiones actualizadas y compatibles
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  
  # Supabase - Para almacenamiento de imágenes
  supabase_flutter: ^2.10.3
  
  # Autenticación con Google
  google_sign_in: ^6.3.0
  
  # Manejo de imágenes
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1
  
  # UI y utilidades
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.5.0
  path_provider: ^2.1.5
  mime: ^1.0.6
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.7.0
  geolocator: ^11.0.0
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true

  #Assets (descomenta si necesitas agregar recursos)
  assets:
    - assets/google_logo_files/google-37.png